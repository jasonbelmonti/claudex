name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Verify And Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run CI contract
        run: bun run ci

      - name: Verify package contents
        run: bun run package:check

      - name: Read package metadata
        id: package
        run: |
          node <<'EOF' >> "$GITHUB_OUTPUT"
          const fs = require("node:fs");
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));

          console.log(`name=${pkg.name}`);
          console.log(`version=${pkg.version}`);
          console.log(`expected_tag=v${pkg.version}`);
          EOF

      - name: Validate tag matches package version
        if: github.event_name == 'push'
        run: |
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "Expected a tag push, got ref type '${GITHUB_REF_TYPE}'."
            exit 1
          fi

          if [ "${GITHUB_REF_NAME}" != "${{ steps.package.outputs.expected_tag }}" ]; then
            echo "Tag '${GITHUB_REF_NAME}' does not match package version '${{ steps.package.outputs.version }}'."
            exit 1
          fi

      - name: Check npm registry for existing version
        id: registry
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version --json >/tmp/npm-version.json 2>/dev/null; then
            published_version="$(tr -d '\"[:space:]' </tmp/npm-version.json)"
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "published_version=${published_version}" >> "$GITHUB_OUTPUT"
            echo "Package version already exists on npm: ${published_version}"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Package version does not exist on npm yet."
          fi

      - name: Skip publish for workflow_dispatch rehearsal
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "workflow_dispatch rehearsal complete."
          echo "Package: ${{ steps.package.outputs.name }}"
          echo "Version: ${{ steps.package.outputs.version }}"
          echo "Already on npm: ${{ steps.registry.outputs.exists }}"

      - name: Skip publish because version already exists
        if: github.event_name == 'push' && steps.registry.outputs.exists == 'true'
        run: |
          echo "Skipping publish because ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} already exists on npm."

      - name: Publish package to npm
        if: github.event_name == 'push' && steps.registry.outputs.exists != 'true'
        run: npm publish --provenance --access public
